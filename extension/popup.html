<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elevra Apply</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 260px;
      padding: 20px 18px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #f1f5f9;
    }
    .logo {
      font-size: 17px;
      font-weight: 800;
      background: linear-gradient(135deg, #FF6575, #B4A7F5);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.3px;
      margin-bottom: 4px;
    }
    .tagline {
      font-size: 11px;
      color: #64748b;
      margin-bottom: 16px;
    }
    .status-card {
      background: #1e293b;
      border-radius: 10px;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
      flex-shrink: 0;
      box-shadow: 0 0 6px rgba(34,197,94,.6);
    }
    .status-text {
      font-size: 12px;
      font-weight: 600;
      color: #e2e8f0;
    }
    .hint {
      font-size: 11px;
      color: #475569;
      line-height: 1.5;
    }
    .divider {
      height: 1px;
      background: #1e293b;
      margin: 12px 0;
    }
  </style>
</head>
<body>
  <p class="logo">Elevra Apply</p>
  <p class="tagline">One-Click Job Application</p>

  <div class="status-card">
    <span class="dot"></span>
    <span class="status-text">Extension Active</span>
  </div>

  <p class="hint">
    Visit the <strong style="color:#B4A7F5">Elevra Jobs</strong> page and click
    <strong style="color:#FF6575">One-Click Apply</strong> on any job listing.
  </p>

  <div class="divider"></div>

  <p class="hint" style="color:#334155">
    Forms are auto-filled using your resume &amp; profile data stored in Elevra.
  </p>
</body>
</html>
