server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # React Router — all unmatched paths fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Aggressively cache hashed static assets (Vite appends content hash)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"                   always;
    add_header X-Content-Type-Options "nosniff"                      always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # Suppress noisy access logs for health-check pings
    location = /healthz {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }
}
